<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>HSN SHOP</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <a href="index.html" class="logo">HSN</a>

  <div class="search-box">
    <input type="text" placeholder="Buscar...">
  </div>

  <!-- 🛒 ICONO CARRITO -->
  <a href="carrito.html" class="carrito-icono">🛒</a>
</header>

<!-- SECCIÓN PRODUCTOS HOMBRE -->
<section class="productos-hombre">

  <div class="productos-header">
    <h2>COLECCIÓN HOMBRE</h2>

    <div class="filtros">
      <button class="filtro active">Todos</button>
      <button class="filtro">Tenis</button>
      <button class="filtro">Camisas</button>
      <button class="filtro">Accesorios</button>
    </div>
  </div>

  <div class="productos-grid">

    <div class="producto">
      <div class="producto-img">
        <img src="Tenis.png">
      </div>
      <div class="producto-info">
        <h3>Tenis Nike White</h3>
        <p>$1,499 MXN</p>
        <a href="carrito.html" class="btn-producto">Agregar 🛒</a>
      </div>
    </div>

    <div class="producto">
      <div class="producto-img">
        <img src="Camisa.png">
      </div>
      <div class="producto-info">
        <h3>Camisa Oversize</h3>
        <p>$899 MXN</p>
        <a href="carrito.html" class="btn-producto">Agregar 🛒</a>
      </div>
    </div>

    <div class="producto">
      <div class="producto-img">
        <img src="Gorra.png">
      </div>
      <div class="producto-info">
        <h3>Gorra Minimal</h3>
        <p>$499 MXN</p>
        <a href="carrito.html" class="btn-producto">Agregar 🛒</a>
      </div>
    </div>

  </div>
</section>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Carrito | HSN SHOP</title>
  <link rel="stylesheet" href="carrito.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
  <a href="index.html" class="logo">HSN</a>
  <span class="carrito-title">Carrito</span>
</header>

<section class="carrito-container">

  <!-- PRODUCTOS -->
  <div class="carrito-productos">

    <div class="carrito-item">
      <img src="Tenis.png">
      <div class="info">
        <h3>Tenis Nike White</h3>
        <p>$1,499 MXN</p>

        <div class="cantidad">
          <button>-</button>
          <span>1</span>
          <button>+</button>
        </div>
      </div>

      <button class="eliminar">✕</button>
    </div>

    <div class="carrito-item">
      <img src="Camisa.png">
      <div class="info">
        <h3>Camisa Oversize</h3>
        <p>$899 MXN</p>

        <div class="cantidad">
          <button>-</button>
          <span>1</span>
          <button>+</button>
        </div>
      </div>

      <button class="eliminar">✕</button>
    </div>

  </div>

  <!-- RESUMEN -->
  <div class="carrito-resumen">
    <h3>Resumen</h3>

    <div class="fila">
      <span>Subtotal</span>
      <span>$2,398</span>
    </div>

    <div class="fila">
      <span>Envío</span>
      <span>Gratis</span>
    </div>

    <div class="total">
      <span>Total</span>
      <span>$2,398</span>
    </div>

    <button class="btn-checkout">Finalizar compra</button>
  </div>

</section>

</body>
</html>

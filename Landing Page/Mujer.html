<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>HSN SHOP</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <a href="index.html" class="logo">HSN</a>

  <div class="search-box">
    <input type="text" placeholder="Buscar...">
  </div>

  <!-- 🛒 CARRITO -->
  <a href="carrito.html" class="carrito-icono">🛒</a>
</header>

<!-- SECCIÓN PRODUCTOS MUJER -->
<section class="productos-mujer">

  <div class="productos-header">
    <h2>COLECCIÓN MUJER</h2>

    <div class="filtros-mujer">
      <button class="filtro-m active">Todos</button>
      <button class="filtro-m">Vestidos</button>
      <button class="filtro-m">Blusas</button>
      <button class="filtro-m">Accesorios</button>
    </div>
  </div>

  <div class="productos-grid-mujer">

    <div class="producto-m">
      <div class="producto-img-m">
        <img src="Vestido.png" alt="">
      </div>
      <div class="producto-info-m">
        <h3>Vestido Elegance</h3>
        <p>$1,299 MXN</p>
        <a href="carrito.html" class="btn-producto-m">Agregar 🛒</a>
      </div>
    </div>

    <div class="producto-m">
      <div class="producto-img-m">
        <img src="Blusa.png" alt="">
      </div>
      <div class="producto-info-m">
        <h3>Blusa Minimal</h3>
        <p>$799 MXN</p>
        <a href="carrito.html" class="btn-producto-m">Agregar 🛒</a>
      </div>
    </div>

    <div class="producto-m">
      <div class="producto-img-m">
        <img src="Bolso.png" alt="">
      </div>
      <div class="producto-info-m">
        <h3>Bolso Chic</h3>
        <p>$1,099 MXN</p>
        <a href="carrito.html" class="btn-producto-m">Agregar 🛒</a>
      </div>
    </div>

  </div>
</section>

</body>
</html>
